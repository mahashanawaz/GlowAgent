<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glow Agent</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <!-- Marked.js for markdown rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy: #002D45;
      --lime: #C1F400;
      --navy-light: #003a5c;
      --navy-dark: #001e2f;
      --text: #e8f4f8;
      --text-muted: #7aadbe;
      --bubble-user: #C1F400;
      --bubble-agent: #003a5c;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }

    html,
    body {
      height: 100%;
      background-color: var(--navy-dark);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(193, 244, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(193, 244, 0, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 24px 0 20px;
      border-bottom: 1px solid rgba(193, 244, 0, 0.15);
      flex-shrink: 0;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      background: var(--lime);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 22px;
      height: 22px;
    }

    .header-text h1 {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--lime);
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
      font-weight: 300;
    }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(193, 244, 0, 0.08);
      border: 1px solid rgba(193, 244, 0, 0.2);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--lime);
      letter-spacing: 0.5px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--lime);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: rgba(193, 244, 0, 0.2) transparent;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(193, 244, 0, 0.2);
      border-radius: 2px;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0.5;
      text-align: center;
      padding: 40px;
    }

    .empty-state .big-icon {
      font-size: 48px;
      line-height: 1;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 280px;
      line-height: 1.6;
    }

    /* Message bubbles */
    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeUp 0.3s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      align-items: flex-end;
    }

    .message.agent {
      align-items: flex-start;
    }

    .message-label {
      font-size: 10px;
      font-family: var(--font-mono);
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      font-weight: 400;
    }

    .message.user .bubble {
      background: var(--lime);
      color: var(--navy-dark);
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }

    .message.agent .bubble {
      background: var(--bubble-agent);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(193, 244, 0, 0.1);
    }

    /* ── Markdown styles inside agent bubbles ── */
    .bubble.markdown-body p {
      margin-bottom: 0.6em;
    }

    .bubble.markdown-body p:last-child {
      margin-bottom: 0;
    }

    .bubble.markdown-body h1,
    .bubble.markdown-body h2,
    .bubble.markdown-body h3,
    .bubble.markdown-body h4 {
      font-family: var(--font-mono);
      color: var(--lime);
      margin: 0.9em 0 0.4em;
      line-height: 1.3;
      font-weight: 700;
    }

    .bubble.markdown-body h1 {
      font-size: 16px;
    }

    .bubble.markdown-body h2 {
      font-size: 15px;
    }

    .bubble.markdown-body h3 {
      font-size: 14px;
    }

    .bubble.markdown-body h4 {
      font-size: 13px;
      color: var(--text-muted);
    }

    .bubble.markdown-body ul,
    .bubble.markdown-body ol {
      padding-left: 1.4em;
      margin: 0.4em 0 0.6em;
    }

    .bubble.markdown-body li {
      margin-bottom: 0.3em;
    }

    .bubble.markdown-body li::marker {
      color: var(--lime);
    }

    .bubble.markdown-body strong {
      color: var(--lime);
      font-weight: 600;
    }

    .bubble.markdown-body em {
      color: var(--text-muted);
      font-style: italic;
    }

    .bubble.markdown-body code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: rgba(193, 244, 0, 0.08);
      border: 1px solid rgba(193, 244, 0, 0.15);
      border-radius: 4px;
      padding: 1px 5px;
      color: var(--lime);
    }

    .bubble.markdown-body pre {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(193, 244, 0, 0.12);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 0.6em 0;
    }

    .bubble.markdown-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 12px;
    }

    .bubble.markdown-body blockquote {
      border-left: 3px solid var(--lime);
      padding: 4px 12px;
      margin: 0.6em 0;
      color: var(--text-muted);
      font-style: italic;
    }

    .bubble.markdown-body hr {
      border: none;
      border-top: 1px solid rgba(193, 244, 0, 0.15);
      margin: 0.8em 0;
    }

    .bubble.markdown-body a {
      color: var(--lime);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .bubble.markdown-body a:hover {
      opacity: 0.8;
    }

    .bubble.markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.6em 0;
      font-size: 13px;
    }

    .bubble.markdown-body th {
      background: rgba(193, 244, 0, 0.1);
      color: var(--lime);
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 6px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(193, 244, 0, 0.2);
    }

    .bubble.markdown-body td {
      padding: 6px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .bubble.markdown-body tr:last-child td {
      border-bottom: none;
    }

    /* ── end markdown styles ── */

    .message.agent .bubble.bubble-rich {
      max-width: 96%;
      padding: 14px 16px;
    }

    .agent-text-segment {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .agent-text-segment + .product-card {
      margin-top: 12px;
    }

    .product-card + .agent-text-segment {
      margin-top: 12px;
    }

    .product-card + .product-card {
      margin-top: 10px;
    }

    .agent-inline-link {
      color: var(--lime);
      text-decoration: underline;
      word-break: break-all;
    }

    .product-card {
      display: flex;
      align-items: stretch;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(193,244,0,0.18);
      background: rgba(0, 30, 46, 0.55);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
    }

    .product-card:hover {
      border-color: rgba(193,244,0,0.35);
      background: rgba(0, 40, 58, 0.65);
    }

    .product-card-thumb {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-card-thumb--empty::after {
      content: '◆';
      font-size: 20px;
      color: var(--text-muted);
      opacity: 0.45;
    }

    .product-card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .product-card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text);
    }

    .product-card-cta {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--lime);
      letter-spacing: 0.3px;
    }

    /* Markdown segments inside rich bubbles (product cards + text) */
    .bubble.bubble-rich .markdown-body p {
      margin-bottom: 0.6em;
    }

    .bubble.bubble-rich .markdown-body p:last-child {
      margin-bottom: 0;
    }

    .bubble.bubble-rich .markdown-body h1,
    .bubble.bubble-rich .markdown-body h2,
    .bubble.bubble-rich .markdown-body h3,
    .bubble.bubble-rich .markdown-body h4 {
      font-family: var(--font-mono);
      color: var(--lime);
      margin: 0.9em 0 0.4em;
      line-height: 1.3;
      font-weight: 700;
    }

    .bubble.bubble-rich .markdown-body h1 { font-size: 16px; }
    .bubble.bubble-rich .markdown-body h2 { font-size: 15px; }
    .bubble.bubble-rich .markdown-body h3 { font-size: 14px; }
    .bubble.bubble-rich .markdown-body h4 { font-size: 13px; color: var(--text-muted); }

    .bubble.bubble-rich .markdown-body ul,
    .bubble.bubble-rich .markdown-body ol {
      padding-left: 1.4em;
      margin: 0.4em 0 0.6em;
    }

    .bubble.bubble-rich .markdown-body li { margin-bottom: 0.3em; }
    .bubble.bubble-rich .markdown-body li::marker { color: var(--lime); }
    .bubble.bubble-rich .markdown-body strong { color: var(--lime); font-weight: 600; }
    .bubble.bubble-rich .markdown-body em { color: var(--text-muted); font-style: italic; }

    .bubble.bubble-rich .markdown-body code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: rgba(193, 244, 0, 0.08);
      border: 1px solid rgba(193, 244, 0, 0.15);
      border-radius: 4px;
      padding: 1px 5px;
      color: var(--lime);
    }

    .bubble.bubble-rich .markdown-body pre {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(193, 244, 0, 0.12);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 0.6em 0;
    }

    .bubble.bubble-rich .markdown-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 12px;
    }

    .bubble.bubble-rich .markdown-body blockquote {
      border-left: 3px solid var(--lime);
      padding: 4px 12px;
      margin: 0.6em 0;
      color: var(--text-muted);
      font-style: italic;
    }

    .bubble.bubble-rich .markdown-body hr {
      border: none;
      border-top: 1px solid rgba(193, 244, 0, 0.15);
      margin: 0.8em 0;
    }

    .bubble.bubble-rich .markdown-body a {
      color: var(--lime);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .bubble.bubble-rich .markdown-body a:hover { opacity: 0.8; }

    .bubble.bubble-rich .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.6em 0;
      font-size: 13px;
    }

    .bubble.bubble-rich .markdown-body th {
      background: rgba(193, 244, 0, 0.1);
      color: var(--lime);
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 6px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(193, 244, 0, 0.2);
    }

    .bubble.bubble-rich .markdown-body td {
      padding: 6px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .bubble.bubble-rich .markdown-body tr:last-child td { border-bottom: none; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
      background: var(--bubble-agent);
      border: 1px solid rgba(193, 244, 0, 0.1);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--lime);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      30% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* Error message */
    .error-bubble {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.3);
      color: #ff9090;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      max-width: 72%;
    }

    /* Input area */
    .input-area {
      padding: 16px 0 28px;
      flex-shrink: 0;
      border-top: 1px solid rgba(193, 244, 0, 0.1);
    }

    .api-url-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .api-url-label {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .api-url-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(193, 244, 0, 0.15);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 11px;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-url-input:focus {
      border-color: rgba(193, 244, 0, 0.4);
      color: var(--text);
    }

    .api-url-input::placeholder {
      color: rgba(122, 173, 190, 0.4);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .message-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(193, 244, 0, 0.2);
      border-radius: 14px;
      padding: 13px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      resize: none;
      min-height: 50px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    .message-input:focus {
      border-color: rgba(193, 244, 0, 0.5);
    }

    .message-input::placeholder {
      color: rgba(122, 173, 190, 0.5);
    }

    .send-btn {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: var(--lime);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.15s;
    }

    .send-btn:hover {
      transform: scale(1.05);
      background: #d4ff1a;
    }

    .send-btn:active {
      transform: scale(0.97);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
      color: var(--navy-dark);
    }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      opacity: 0.6;
      font-family: var(--font-mono);
    }
  </style>
</head>

<body>
  <div class="app">

    <header>
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 18V5l12-2v13" stroke="#002D45" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="6" cy="18" r="3" stroke="#002D45" stroke-width="2" />
          <circle cx="18" cy="16" r="3" stroke="#002D45" stroke-width="2" />
        </svg>
      </div>
      <div class="header-text">
        <h1>Glow Agent</h1>
        <p>Skincare assistant powered by LangGraph</p>
      </div>
      <div class="status-pill">
        <div class="status-dot"></div>
        LIVE
      </div>
    </header>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="big-icon">🎵</div>
        <p>Ask Glow Agent about about skin care advice, produt recommendation, or to generate personalized,
          budget-conscious skincare routines for you.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="api-url-row">
        <span class="api-url-label">API URL</span>
        <input class="api-url-input" id="apiUrl" type="text"
          placeholder="Leave blank to use this server (e.g. http://127.0.0.1:8000)" />
      </div>
      <div class="input-row">
        <textarea class="message-input" id="messageInput"
          placeholder="What face cleanser products do you recommend for oily, acne-prone skin?" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <p class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
    </div>

  </div>

  <script>
    if (typeof marked !== 'undefined') {
      marked.setOptions({
        breaks: true,
        gfm: true,
        headerIds: false,
        mangle: false,
      });
    }

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiUrlEl = document.getElementById('apiUrl');
    const emptyState = document.getElementById('emptyState');

    let isLoading = false;

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    });

    // Enter to send, Shift+Enter for newline
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function linkifyPlainTextFragment(text) {
    const frag = document.createDocumentFragment();
    if (!text) return frag;
    const re = /(https?:\/\/[^\s<]+[^<.,:;"')\]\s]*)/g;
    let last = 0;
    let m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) {
        frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      }
      const a = document.createElement('a');
      a.href = m[1];
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.className = 'agent-inline-link';
      a.textContent = m[1];
      frag.appendChild(a);
      last = m.index + m[1].length;
    }
    if (last < text.length) {
      frag.appendChild(document.createTextNode(text.slice(last)));
    }
    return frag;
  }

  function stripTrailingJunkFromUrl(u) {
    if (!u) return u;
    let s = u.trim();
    while (/[),.;>]+$/.test(s) && s.length > 8) {
      s = s.slice(0, -1);
    }
    return s;
  }

  function parseAgentMessage(text) {
    const lines = text.split('\n');
    const segments = [];
    const buf = [];
    let pendingTitle = null;

    const LINK_RE = /^\s*(?:\*\*)?\s*(Link|More Info):\s*(https?:\/\/\S+)/i;
    const IMG_RE = /^\s*(?:\*\*)?\s*Image:\s*(https?:\/\/\S+)/i;
    const LOOKAHEAD = 12;

    function flushBuf() {
      const t = buf.join('\n');
      if (t) segments.push({ type: 'text', text: t });
      buf.length = 0;
    }

    function cleanForMatch(line) {
      return line.replace(/\*\*/g, '').trim();
    }

    for (let i = 0; i < lines.length; i++) {
      const raw = lines[i];
      const line = cleanForMatch(raw);

      const num = line.match(/^(\d+)\.\s+(.+)$/);
      if (num) pendingTitle = num[2].trim();

      const prod = line.match(/^Product:\s*(.+)$/i);
      if (prod) pendingTitle = prod[1].trim();

      const headingName = line.match(/^([^:]+):\s*$/);
      if (
        headingName &&
        headingName[1].length > 3 &&
        headingName[1].length < 120 &&
        !/^(why|skin|link|image|more info|when|note|category|effects)/i.test(headingName[1].trim())
      ) {
        pendingTitle = headingName[1].trim();
      }

      const linkOnLine = raw.match(LINK_RE) || (line && line.match(LINK_RE));
      const imgOnLine = raw.match(IMG_RE) || (line && line.match(IMG_RE));

      if (linkOnLine) {
        const linkUrl = stripTrailingJunkFromUrl(linkOnLine[2]);
        let imageUrl = '';
        let consumed = i;
        for (let j = i + 1; j < Math.min(lines.length, i + LOOKAHEAD); j++) {
          const L = cleanForMatch(lines[j]);
          if (!L) continue;
          if (/^(Link|More Info):/i.test(L)) break;
          const im = L.match(IMG_RE) || lines[j].match(IMG_RE);
          if (im) {
            imageUrl = stripTrailingJunkFromUrl(im[1]);
            consumed = j;
            break;
          }
        }
        flushBuf();
        segments.push({
          type: 'card',
          url: linkUrl,
          image: imageUrl,
          title: pendingTitle || ''
        });
        pendingTitle = null;
        i = consumed;
        continue;
      }

      if (imgOnLine && !linkOnLine) {
        const imageUrl = stripTrailingJunkFromUrl(imgOnLine[1]);
        let linkUrl = '';
        let consumed = i;
        for (let j = i + 1; j < Math.min(lines.length, i + LOOKAHEAD); j++) {
          const L = cleanForMatch(lines[j]);
          if (!L) continue;
          if (/^Image:/i.test(L)) break;
          const lm = L.match(LINK_RE) || lines[j].match(LINK_RE);
          if (lm) {
            linkUrl = stripTrailingJunkFromUrl(lm[2]);
            consumed = j;
            break;
          }
        }
        if (linkUrl) {
          flushBuf();
          segments.push({
            type: 'card',
            url: linkUrl,
            image: imageUrl,
            title: pendingTitle || ''
          });
          pendingTitle = null;
          i = consumed;
          continue;
        }
      }

      buf.push(raw);
    }
    flushBuf();
    return segments;
  }

  function createProductCard({ url, image, title }) {
    const a = document.createElement('a');
    a.className = 'product-card';
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';

    const imgWrap = document.createElement('div');
    imgWrap.className = 'product-card-thumb';
    const hasImg = image && /^https?:\/\//i.test(String(image).trim());
    if (hasImg) {
      const img = document.createElement('img');
      img.src = image.trim();
      img.alt = title || 'Product';
      img.loading = 'lazy';
      img.referrerPolicy = 'no-referrer-when-downgrade';
      img.onerror = () => {
        img.remove();
        imgWrap.classList.add('product-card-thumb--empty');
      };
      imgWrap.appendChild(img);
    } else {
      imgWrap.classList.add('product-card-thumb--empty');
    }

    const body = document.createElement('div');
    body.className = 'product-card-body';
    const titleEl = document.createElement('div');
    titleEl.className = 'product-card-title';
    titleEl.textContent = title || 'Recommended product';
    const cta = document.createElement('span');
    cta.className = 'product-card-cta';
    cta.textContent = 'View product →';
    body.appendChild(titleEl);
    body.appendChild(cta);

    a.appendChild(imgWrap);
    a.appendChild(body);
    return a;
  }

  function appendAgentMessage(text) {
    if (emptyState) emptyState.remove();

    const wrapper = document.createElement('div');
    wrapper.className = 'message agent';

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = 'Glow Agent';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bubble-rich';

    const segments = parseAgentMessage(text);
    for (const seg of segments) {
      if (seg.type === 'text') {
        const div = document.createElement('div');
        div.className = 'markdown-body';
        if (typeof marked !== 'undefined') {
          div.innerHTML = marked.parse(seg.text);
          div.querySelectorAll('a').forEach((a) => {
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
          });
        } else {
          div.appendChild(linkifyPlainTextFragment(seg.text));
        }
        bubble.appendChild(div);
      } else if (seg.type === 'card') {
        bubble.appendChild(createProductCard(seg));
      }
    }

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrapper;
  }

  function appendMessage(role, text) {
    if (emptyState) emptyState.remove();

    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = role === 'user' ? 'You' : 'Glow Agent';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrapper;
  }

  function showTyping() {
    if (emptyState) emptyState.remove();

    const wrapper = document.createElement('div');
    wrapper.className = 'message agent';
    wrapper.id = 'typingIndicator';

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = 'Glow Agent';

    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<span></span><span></span><span></span>';

    wrapper.appendChild(label);
    wrapper.appendChild(indicator);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function showError(msg) {
    removeTyping();
    const wrapper = document.createElement('div');
    wrapper.className = 'message agent';

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = 'GlowAgent';

    const bubble = document.createElement('div');
    bubble.className = 'error-bubble';
    bubble.textContent = msg;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const message = inputEl.value.trim();
    const apiUrl = apiUrlEl.value.trim().replace(/\/$/, '');

    if (!message || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMessage('user', message);
    showTyping();

    const chatUrl = apiUrl ? `${apiUrl}/chat` : '/chat';

    try {
      const res = await fetch(chatUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showError(`Error ${res.status}: ${err.detail || 'Something went wrong.'}`);
      } else {
        const data = await res.json();
        appendAgentMessage(data.response);
      }
    } catch (err) {
      showError('Could not reach the API. Check your URL and make sure CORS is enabled in main.py.');
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
  </script>
