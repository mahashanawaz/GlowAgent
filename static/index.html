<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glow Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #002D45;
      --lime: #C1F400;
      --navy-light: #003a5c;
      --navy-dark: #001e2f;
      --text: #e8f4f8;
      --text-muted: #7aadbe;
      --bubble-user: #C1F400;
      --bubble-agent: #003a5c;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background-color: var(--navy-dark);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(193,244,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(193,244,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 24px 0 20px;
      border-bottom: 1px solid rgba(193,244,0,0.15);
      flex-shrink: 0;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      background: var(--lime);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 22px;
      height: 22px;
    }

    .header-text h1 {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--lime);
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
      font-weight: 300;
    }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(193,244,0,0.08);
      border: 1px solid rgba(193,244,0,0.2);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--lime);
      letter-spacing: 0.5px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--lime);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: rgba(193,244,0,0.2) transparent;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(193,244,0,0.2); border-radius: 2px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0.5;
      text-align: center;
      padding: 40px;
    }

    .empty-state .big-icon {
      font-size: 48px;
      line-height: 1;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 280px;
      line-height: 1.6;
    }

    /* Message bubbles */
    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeUp 0.3s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-items: flex-end; }
    .message.agent { align-items: flex-start; }

    .message-label {
      font-size: 10px;
      font-family: var(--font-mono);
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      font-weight: 400;
    }

    .message.user .bubble {
      background: var(--lime);
      color: var(--navy-dark);
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }

    .message.agent .bubble {
      background: var(--bubble-agent);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(193,244,0,0.1);
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
      background: var(--bubble-agent);
      border: 1px solid rgba(193,244,0,0.1);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--lime);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Error message */
    .error-bubble {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.3);
      color: #ff9090;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      max-width: 72%;
    }

    /* Input area */
    .input-area {
      padding: 16px 0 28px;
      flex-shrink: 0;
      border-top: 1px solid rgba(193,244,0,0.1);
    }

    .api-url-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .api-url-label {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .api-url-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(193,244,0,0.15);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 11px;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-url-input:focus {
      border-color: rgba(193,244,0,0.4);
      color: var(--text);
    }

    .api-url-input::placeholder { color: rgba(122,173,190,0.4); }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .message-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(193,244,0,0.2);
      border-radius: 14px;
      padding: 13px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      resize: none;
      min-height: 50px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    .message-input:focus { border-color: rgba(193,244,0,0.5); }
    .message-input::placeholder { color: rgba(122,173,190,0.5); }

    .send-btn {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: var(--lime);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.15s;
    }

    .send-btn:hover { transform: scale(1.05); background: #d4ff1a; }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .send-btn svg {
      width: 20px;
      height: 20px;
      color: var(--navy-dark);
    }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      opacity: 0.6;
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 18V5l12-2v13" stroke="#002D45" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="6" cy="18" r="3" stroke="#002D45" stroke-width="2"/>
        <circle cx="18" cy="16" r="3" stroke="#002D45" stroke-width="2"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Glow Agent</h1>
      <p>Skincare assistant powered by LangGraph</p>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      LIVE
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="big-icon">🎵</div>
      <p>Ask Glow Agent about about skin care advice, produt recommendation, or to generate personalized, budget-conscious skincare routines for you.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="api-url-row">
      <span class="api-url-label">API URL</span>
      <input
        class="api-url-input"
        id="apiUrl"
        type="text"
        placeholder="https://your-service-name.onrender.com"
        placeholder="leave blank to use this page's server"
      />
    </div>
    <div class="input-row">
      <textarea
        class="message-input"
        id="messageInput"
        placeholder="What face cleanser products do you recommend for oily, acne-prone skin?"
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const apiUrlEl = document.getElementById('apiUrl');
  const emptyState = document.getElementById('emptyState');

  let isLoading = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // Enter to send, Shift+Enter for newline
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function appendMessage(role, text) {
    if (emptyState) emptyState.remove();

    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = role === 'user' ? 'You' : 'Glow Agent';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrapper;
  }

  function showTyping() {
    if (emptyState) emptyState.remove();

    const wrapper = document.createElement('div');
    wrapper.className = 'message agent';
    wrapper.id = 'typingIndicator';

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = 'Glow Agent';

    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<span></span><span></span><span></span>';

    wrapper.appendChild(label);
    wrapper.appendChild(indicator);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function showError(msg) {
    removeTyping();
    const wrapper = document.createElement('div');
    wrapper.className = 'message agent';

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = 'GlowAgent';

    const bubble = document.createElement('div');
    bubble.className = 'error-bubble';
    bubble.textContent = msg;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const message = inputEl.value.trim();
    const apiUrl = apiUrlEl.value.trim().replace(/\/$/, '');

    if (!message || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMessage('user', message);
    showTyping();

    const chatUrl = apiUrl ? `${apiUrl}/chat` : '/chat';

    try {
      const res = await fetch(chatUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showError(`Error ${res.status}: ${err.detail || 'Something went wrong.'}`);
      } else {
        const data = await res.json();
        appendMessage('agent', data.response);
      }
    } catch (err) {
      showError('Could not reach the API. Check your URL and make sure CORS is enabled in main.py.');
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
